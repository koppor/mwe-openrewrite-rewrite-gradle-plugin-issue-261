plugins {
    id 'application'
    id 'org.openrewrite.rewrite' version '6.8.1'
}

repositories {
    mavenCentral()
    maven {
      url = uri("https://oss.sonatype.org/content/repositories/snapshots")
    }
}

dependencies {
    implementation 'org.slf4j:slf4j-api:2.0.11'
}

application {
    mainClass = 'example.Main'
}

rewrite {
    failOnDryRunResults = true
}
